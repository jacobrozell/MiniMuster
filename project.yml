name: MiniMuster
options:
  bundleIdPrefix: com.jacobrozell
  deploymentTarget:
    iOS: "18.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: 7JT2JB89AV
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_EMIT_LOC_STRINGS: YES

targets:
  MiniMuster:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: MiniMuster
    entitlements:
      path: MiniMuster/MiniMuster.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.jacobrozell.minimuster
    info:
      path: MiniMuster/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchStoryboardName: LaunchScreen
        CFBundleURLTypes:
          - CFBundleURLName: com.jacobrozell.minimuster
            CFBundleURLSchemes:
              - minimuster
        NSPhotoLibraryUsageDescription: MiniMuster uses your photo library to attach progress pictures to units.
    dependencies:
      - target: MiniMusterWidget
        embed: true
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobrozell.minimuster
        PRODUCT_NAME: MiniMuster
        INFOPLIST_KEY_CFBundleDisplayName: MiniMuster
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        TARGETED_DEVICE_FAMILY: "1,2"

  MiniMusterWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: MiniMusterWidget
        excludes:
          - Info.plist
      - path: MiniMuster/Widget
        includes:
          - WidgetDataStore.swift
      - path: MiniMuster/Support
        includes:
          - AppDeepLink.swift
    entitlements:
      path: MiniMusterWidget/MiniMusterWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.jacobrozell.minimuster
    info:
      path: MiniMusterWidget/Info.plist
      properties:
        CFBundleDisplayName: MiniMuster
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobrozell.minimuster.widget
        PRODUCT_NAME: MiniMusterWidget
        SKIP_INSTALL: YES
        TARGETED_DEVICE_FAMILY: "1,2"

  MiniMusterTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: MiniMusterTests
    dependencies:
      - target: MiniMuster
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobrozell.minimuster.tests

  MiniMusterUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: MiniMusterUITests
    dependencies:
      - target: MiniMuster
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jacobrozell.minimuster.uitests
        TEST_TARGET_NAME: MiniMuster

schemes:
  MiniMuster:
    build:
      targets:
        MiniMuster: all
        MiniMusterTests: [test]
        MiniMusterUITests: [test]
        MiniMusterWidget: all
    test:
      gatherCoverageData: true
      coverageTargets:
        - MiniMuster
        - MiniMusterWidget
      targets:
        - MiniMusterTests
        - MiniMusterUITests
